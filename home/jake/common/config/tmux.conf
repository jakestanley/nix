
# ---- OS-based colouring ----
# macOS/Windows = blue (safe)
# Linux         = red  (not home)
set -g status-style bg=red,fg=white
if-shell 'uname | grep -qi darwin' 'set -g status-style bg=colour235,fg=white'
# Native Windows tmux environments (MSYS2/Git Bash/Cygwin)
if-shell 'uname | grep -Eqi "(mingw|msys|cygwin)"' 'set -g status-style bg=colour18,fg=white; set -g status-left "#[bold fg=white]#H #[fg=colour250]| #(whoami) "; set -g status-right "#[fg=colour250]%Y-%m-%d #[fg=white]%H:%M"'
# WSL reports Linux, but uname -r typically includes "microsoft"
if-shell 'uname -r | grep -qi microsoft' 'set -g status-style bg=colour18,fg=white; set -g status-left "#[bold fg=white]#H #[fg=colour250]| #(whoami) "; set -g status-right "#[fg=colour250]%Y-%m-%d #[fg=white]%H:%M"'

# ---- Default shell (non-Windows) ----
# Start new windows/panes in zsh everywhere unless we detect Windows/WSL below.
set -g default-command ""
if-shell '[ -x /usr/bin/zsh ]' 'set -g default-shell /usr/bin/zsh' 'set -g default-shell /bin/zsh'

# ---- Default shell (Windows) ----
# Start new windows/panes in PowerShell when running tmux on Windows/WSL.
if-shell 'uname | grep -Eqi "(mingw|msys|cygwin)"' 'set -g default-shell "powershell.exe"; set -g default-command "powershell.exe -NoLogo"'
if-shell 'uname -r | grep -qi microsoft' 'set -g default-shell "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe"; set -g default-command "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoLogo"'
#

